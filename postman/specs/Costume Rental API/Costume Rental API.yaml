openapi: 3.1.0
info:
  title: Costume Rental API
  version: 1.0.0
  description: ''
servers:
  - url: '{{baseUrl}}'
paths:
  /auth/login:
    post:
      summary: Login
      responses: {}
      tags:
        - Auth
      description: |-
        Đăng nhập vào hệ thống bằng tên đăng nhập và mật khẩu. Khi thành công, server trả về accessToken (JWT) và thông tin người dùng. Access token sẽ được lưu vào biến môi trường token tự động qua script.

        **Body (JSON):**

        | Trường | Kiểu | Mô tả |
        | --- | --- | --- |
        | username | string | Tên đăng nhập của tài khoản |
        | password | string | Mật khẩu của tài khoản |

        **Response:**

        - 200 OK: { accessToken, user } - đăng nhập thành công, token được lưu vào môi trường.
            
        - 401 Unauthorized: Sai tên đăng nhập hoặc mật khẩu.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: color
            example:
              username: quanghiep031
              password: '123123'
  /register:
    post:
      summary: Register
      responses: {}
      tags:
        - Auth
      description: |-
        Đăng ký tài khoản người dùng mới trong hệ thống. Endpoint này tạo một User mới với vai trò mặc định là USER.

        **Body (JSON):**

        | Trường | Kiểu | Mô tả |  
        |--------|------|-------|  
        | username | string | Tên đăng nhập, phải duy nhất trong hệ thống |  
        | email | string | Địa chỉ email của người dùng |  
        | password | string | Mật khẩu (sẽ được hash trước khi lưu) |  
        | display_name | string | Tên hiển thị của người dùng |  
        | role | enum | Vai trò: ADMIN hoặc USER (mặc định: USER) |

        **Response:**

        - 201 Created: Tài khoản được tạo thành công, trả về thông tin user mới.
            
        - 400 Bad Request: Dữ liệu không hợp lệ hoặc username đã tồn tại.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
                display_name:
                  type: string
                role:
                  type: string
            example:
              username: ''
              email: ''
              password: ''
              display_name: ''
              role: USER
  /auth/logout:
    post:
      summary: Logout
      responses: {}
      tags:
        - Auth
      description: |-
        Đăng xuất khỏi hệ thống. Endpoint này hủy phiên làm việc hiện tại và vô hiệu hóa refresh token đang hoạt động. Yêu cầu gửi kèm access token hợp lệ trong header Authorization.

        **Response:**

        - 200 OK: Đăng xuất thành công.
            
        - 401 Unauthorized: Token không hợp lệ hoặc đã hết hạn.
  /auth/refresh:
    get:
      summary: Refresh Token
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: 'Bearer {{token}}'
      responses: {}
      tags:
        - Auth
      description: |-
        Làm mới access token bằng cách sử dụng refresh token còn hiệu lực. Gửi kèm access token cũ trong header Authorization: Bearer {{token}}. Server sẽ trả về access token mới nếu refresh token hợp lệ.

        **Headers:**

        | Header | Mô tả |  
        |--------|-------|  
        | Authorization | Bearer {{token}} - access token hiện tại |

        **Response:**

        - 200 OK: { accessToken } - token mới được cấp.
            
        - 401 Unauthorized: Refresh token không hợp lệ hoặc đã hết hạn.
  /auth/me:
    get:
      summary: Get Current User
      responses: {}
      tags:
        - Auth
      description: |-
        Lấy thông tin của người dùng đang đăng nhập dựa trên access token hiện tại trong môi trường. Trả về đầy đủ thông tin tài khoản bao gồm username, role, employee_id và trạng thái hoạt động.

        **Response:**

        - 200 OK: Thông tin người dùng hiện tại { id, username, role, employee_id, is_active, ... }.
        - 401 Unauthorized: Token không hợp lệ hoặc chưa đăng nhập.
  /categories:
    get:
      summary: List Categories
      parameters:
        - name: _embed
          in: query
          schema:
            type: string
          example: costumes
        - name: 'type:eq'
          in: query
          schema:
            type: string
          example: EQUIPMENT_PROPS
      responses: {}
      tags:
        - Categories
      description: |-
        Lấy danh sách tất cả danh mục sản phẩm trong hệ thống. Hỗ trợ lọc theo loại danh mục và những sản phẩm liên kết.

        **Query Params:**

        | Tham số | Kiểu | Mô tả |
        | --- | --- | --- |
        | _embed | string | Những dữ liệu liên kết (ví dụ: costumes) |
        | type:eq | enum | Lọc theo loại: COSTUME hoặc EQUIPMENT_PROPS |

        **Response:**

        - 200 OK: Mảng các đối tượng ItemCategory.
    post:
      summary: Create Category
      responses: {}
      tags:
        - Categories
      description: |-
        Tạo mới một danh mục sản phẩm. Yêu cầu quyền ADMIN. Slug sẽ được tự động sinh từ trường name.

        **Body (JSON):**

        | Trường | Kiểu | Mô tả |  
        |--------|------|-------|  
        | name | string | Tên danh mục |  
        | type | enum | Loại danh mục: COSTUME hoặc EQUIPMENT_PROPS |

        **Response:**

        - 201 Created: Danh mục mới được tạo thành công.
            
        - 400 Bad Request: Dữ liệu không hợp lệ.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
            example:
              name: ''
              type: ''
  '/categories/{id}':
    get:
      summary: Get Category
      responses: {}
      tags:
        - Categories
      description: |-
        Lấy thông tin chi tiết của một danh mục sản phẩm theo ID.

        **Path Variables:**

        | Tham số | Kiểu | Mô tả |  
        |---------|------|-------|  
        | id | integer | ID của danh mục cần lấy |

        **Response:**

        - 200 OK: Đối tượng ItemCategory tương ứng.
            
        - 404 Not Found: Không tìm thấy danh mục với ID đã cho.
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: ''
    patch:
      summary: Update Category
      responses: {}
      tags:
        - Categories
      description: |-
        Cập nhật thông tin của một danh mục sản phẩm theo ID. Yêu cầu quyền ADMIN.

        **Path Variables:**

        | Tham số | Kiểu | Mô tả |
        |---------|------|-------|
        | id | integer | ID của danh mục cần cập nhật |

        **Body (JSON):**

        | Trường | Kiểu | Mô tả |
        |--------|------|-------|
        | name | string | Tên danh mục mới |
        | type | enum | Loại danh mục: COSTUME hoặc EQUIPMENT_PROPS |

        **Response:**

        - 200 OK: Danh mục sau khi cập nhật.
        - 404 Not Found: Không tìm thấy danh mục.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
            example:
              name: ''
              type: ''
    delete:
      summary: Delete Category
      parameters:
        - name: permanantly
          in: query
          schema:
            type: boolean
          example: false
      responses: {}
      tags:
        - Categories
      description: |-
        Xóa một danh mục sản phẩm theo ID. Yêu cầu quyền ADMIN. Hỗ trợ xóa mềm (soft delete) hoặc xóa vĩnh viễn tùy theo tham số permanantly.

        **Path Variables:**

        | Tham số | Kiểu | Mô tả |
        |---------|------|-------|
        | id | integer | ID của danh mục cần xóa |

        **Query Params:**

        | Tham số | Kiểu | Mô tả |
        |---------|------|-------|
        | permanantly | boolean | true để xóa vĩnh viễn, false để xóa mềm (mặc định: false) |

        **Response:**

        - 200 OK: Xóa thành công.
        - 404 Not Found: Không tìm thấy danh mục.
  /costumes:
    get:
      summary: List Costumes
      responses: {}
      tags:
        - Costumes
      description: |-
        Lấy danh sách tất cả trang phục trong hệ thống. Hỗ trợ lọc theo danh mục, giới tính, kích cỡ và từ khóa tìm kiếm.

        **Response:**

        - 200 OK: Mảng các đối tượng Costume.
    post:
      summary: Create Costume
      responses: {}
      tags:
        - Costumes
      description: |-
        Tạo mới một trang phục trong hệ thống. Yêu cầu quyền ADMIN. SKU và slug sẽ được tự động sinh.

        **Body (JSON):**

        | Trường | Kiểu | Mô tả |
        |--------|------|-------|
        | name | string | Tên trang phục |
        | category_id | integer | ID danh mục (ItemCategory, type = COSTUME) |
        | sizes | array | Các kích cỡ: XS, S, M, L, XL, 2XL, 3XL |
        | gender | enum | Giới tính: MALE, FEMALE, UNISEX |
        | images | array | Danh sách ID ảnh (ImageGallery) |
        | rental_price_per_day | integer | Giá thuê/ngày (tối thiểu 50.000 VND) |
        | unit | enum | Đơn vị: SET hoặc PIECE |
        | description | string | Mô tả chi tiết |
        | hashtags | array | Danh sách hashtag, không trùng lặp |
        | color | object | Màu sắc: { hex, code, intensity } |

        **Response:**

        - 201 Created: Trang phục mới được tạo thành công.
        - 400 Bad Request: Dữ liệu không hợp lệ.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                category_id:
                  type: 'null'
                sizes:
                  type: array
                gender:
                  type: string
                images:
                  type: array
                rental_price_per_day:
                  type: integer
                unit:
                  type: string
                description:
                  type: 'null'
                hashtags:
                  type: array
                color:
                  type: 'null'
            example:
              name: ''
              category_id: null
              sizes: []
              gender: ''
              images: []
              rental_price_per_day: 50000
              unit: ''
              description: null
              hashtags: []
              color: null
  '/costumes/{id}':
    get:
      summary: Get Costume
      responses: {}
      tags:
        - Costumes
      description: |-
        Lấy thông tin chi tiết của một trang phục theo ID, bao gồm hình ảnh, các biến thể kích cỡ, màu sắc và giá thuê.

        **Path Variables:**

        | Tham số | Kiểu | Mô tả |
        |---------|------|-------|
        | id | integer | ID của trang phục cần lấy |

        **Response:**

        - 200 OK: Đối tượng Costume đầy đủ thông tin.
        - 404 Not Found: Không tìm thấy trang phục.
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: ''
    patch:
      summary: Update Costume
      responses: {}
      tags:
        - Costumes
      description: |-
        Cập nhật thông tin của một trang phục theo ID. Yêu cầu quyền ADMIN. Chỉ cần gửi các trường cần thay đổi.

        **Path Variables:**

        | Tham số | Kiểu | Mô tả |
        |---------|------|-------|
        | id | integer | ID của trang phục cần cập nhật |

        **Body (JSON):**

        | Trường | Kiểu | Mô tả |
        |--------|------|-------|
        | name | string | Tên trang phục mới |
        | rental_price_per_day | integer | Giá thuê mới (tối thiểu 50.000 VND) |
        | is_active | boolean | Trạng thái kích hoạt |

        **Response:**

        - 200 OK: Trang phục sau khi cập nhật.
        - 404 Not Found: Không tìm thấy trang phục.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                rental_price_per_day:
                  type: integer
                is_active:
                  type: boolean
            example:
              name: ''
              rental_price_per_day: 50000
              is_active: true
    delete:
      summary: Delete Costume
      parameters:
        - name: permanantly
          in: query
          schema:
            type: boolean
          example: false
      responses: {}
      tags:
        - Costumes
      description: |-
        Xóa một trang phục theo ID. Yêu cầu quyền ADMIN. Hỗ trợ xóa mềm hoặc xóa vĩnh viễn.

        **Path Variables:**

        | Tham số | Kiểu | Mô tả |
        |---------|------|-------|
        | id | integer | ID của trang phục cần xóa |

        **Query Params:**

        | Tham số | Kiểu | Mô tả |
        |---------|------|-------|
        | permanantly | boolean | true để xóa vĩnh viễn, false để xóa mềm (mặc định: false) |

        **Response:**

        - 200 OK: Xóa thành công.
        - 404 Not Found: Không tìm thấy trang phục.
  /employees:
    get:
      summary: List Employees
      responses: {}
      tags:
        - Employees
      description: |-
        Lấy danh sách tất cả nhân viên trong hệ thống. Hỗ trợ lọc theo vị trí công việc, trạng thái làm việc và tìm kiếm theo tên.

        **Response:**

        - 200 OK: Mảng các đối tượng Employee.
    post:
      summary: Create Employee
      responses: {}
      tags:
        - Employees
      description: |-
        Tạo mới hồ sơ nhân viên trong hệ thống. Yêu cầu quyền ADMIN. Mã nhân viên (employee_code) sẽ được tự động sinh.

        **Body (JSON):**

        | Trường | Kiểu | Mô tả |
        |--------|------|-------|
        | full_name | string | Họ và tên đầy đủ của nhân viên |
        | phone | string | Số điện thoại liên hệ |
        | email | string | Địa chỉ email liên hệ |
        | address | string | Địa chỉ thường trú |
        | citizen_id_number | string | Số căn cước công dân / CMND |
        | position | enum | Vị trí: MANAGER, WAREHOUSE_MANAGER, ORDER_PROCESSOR, TALENT, TECHICAL_CREW, WARDROBE |
        | work_status | enum | Trạng thái: ACTIVE, SUSPENDED, EXITED (mặc định: ACTIVE) |

        **Response:**

        - 201 Created: Hồ sơ nhân viên mới được tạo thành công.
        - 400 Bad Request: Dữ liệu không hợp lệ.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                address:
                  type: string
                citizen_id_number:
                  type: string
                position:
                  type: string
                work_status:
                  type: string
            example:
              full_name: ''
              phone: ''
              email: ''
              address: ''
              citizen_id_number: ''
              position: ''
              work_status: ACTIVE
