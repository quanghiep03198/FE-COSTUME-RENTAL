        **Path Variables:**

        | Tham số | Kiểu | Mô tả |
        |---------|------|-------|
        | id | integer | ID của nhân viên cần xóa |

        **Query Params:**

        | Tham số | Kiểu | Mô tả |
        |---------|------|-------|
        | permanantly | boolean | true để xóa vĩnh viễn, false để xóa mềm (mặc định: false) |

        **Response:**

        - 200 OK: Xóa thành công.
        - 404 Not Found: Không tìm thấy nhân viên.
  /equipment-props:
    get:
      summary: List Equipment Props
      responses: {}
      tags:
        - Equipment-Props
      description: |-
        Lấy danh sách tất cả đạo cụ và thiết bị trong hệ thống. Hỗ trợ lọc theo danh mục và từ khóa tìm kiếm.

        **Response:**

        - 200 OK: Mảng các đối tượng EquipmentProps.
    post:
      summary: Create Equipment Prop
      responses: {}
      tags:
        - Equipment-Props
      description: |-
        Tạo mới một đạo cụ/thiết bị trong hệ thống. Yêu cầu quyền ADMIN. Slug sẽ được tự động sinh từ trường name.

        **Body (JSON):**

        | Trường | Kiểu | Mô tả |
        |--------|------|-------|
        | name | string | Tên đạo cụ/thiết bị |
        | category_id | integer | ID danh mục (ItemCategory, type = EQUIPMENT_PROPS) |
        | rental_price_per_day | integer | Giá thuê/ngày (tối thiểu 50.000 VND) |
        | weight_kg | number | Trọng lượng tính bằng kg |
        | dimensions | object | Kích thước (dài x rộng x cao) |
        | is_fragile | boolean | Có dễ vỡ/hư không (mặc định: false) |
        | description | string | Mô tả chi tiết |
        | images | array | Danh sách ID ảnh (ImageGallery) |
        | unit | string | Đơn vị tính (ví dụ: cái, bộ, chiếc) |
        | hashtags | array | Danh sách hashtag, không trùng lặp |

        **Response:**

        - 201 Created: Đạo cụ/thiết bị mới được tạo thành công.
        - 400 Bad Request: Dữ liệu không hợp lệ.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                category_id:
                  type: 'null'
                rental_price_per_day:
                  type: integer
                weight_kg:
                  type: 'null'
                dimensions:
                  type: 'null'
                is_fragile:
                  type: boolean
                description:
                  type: 'null'
                images:
                  type: array
                unit:
                  type: string
                hashtags:
                  type: array
            example:
              name: ''
              category_id: null
              rental_price_per_day: 50000
              weight_kg: null
              dimensions: null
              is_fragile: false
              description: null
              images: []
              unit: ''
              hashtags: []
  '/equipment-props/{id}':
    get:
      summary: Get Equipment Prop
      responses: {}
      tags:
        - Equipment-Props
      description: |-
        Lấy thông tin chi tiết của một đạo cụ/thiết bị theo ID, bao gồm hình ảnh, mô tả và thông tin danh mục.

        **Path Variables:**

        | Tham số | Kiểu | Mô tả |
        |---------|------|-------|
        | id | integer | ID của đạo cụ/thiết bị cần lấy |

        **Response:**

        - 200 OK: Đối tượng EquipmentProps đầy đủ thông tin.
        - 404 Not Found: Không tìm thấy đạo cụ/thiết bị.
    parameters:
      - name: id
        in: path
