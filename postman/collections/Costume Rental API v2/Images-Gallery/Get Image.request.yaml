$kind: http-request
description: |-
  Lấy thông tin metadata của một hình ảnh theo ID, bao gồm tên file, kích thước, URL truy cập và danh mục liên kết.

  **Path Variables:**

  | Tham số | Kiểu | Mô tả |
  |---------|------|-------|
  | id | integer | ID của hình ảnh cần lấy |

  **Response:**

  - 200 OK: Đối tượng ImageGallery với đầy đủ metadata.
  - 404 Not Found: Không tìm thấy hình ảnh.
url: "{{baseUrl}}/images-gallery/:id"
method: GET
pathVariables:
  - key: id
    value: ""
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 2000
