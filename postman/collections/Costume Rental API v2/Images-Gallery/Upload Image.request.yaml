$kind: http-request
name: Upload Image
description: |-
  Upload một hoặc nhiều hình ảnh lên hệ thống sử dụng multipart/form-data. Hỗ trợ các định dạng PNG, JPG, JPEG, WEBP. Trả về thông tin metadata của các ảnh đã upload.

  **Form Data:**

  | Trường | Kiểu | Mô tả |
  |--------|------|-------|
  | data | text (JSON) | Metadata kèm theo: { category_id } |
  | files | file | File ảnh cần upload (PNG/JPG/JPEG/WEBP) |

  **Response:**

  - 201 Created: Danh sách đối tượng ImageGallery của các ảnh đã upload.
  - 400 Bad Request: Định dạng file không hợp lệ.
url: "{{baseUrl}}/images-gallery/upload"
method: POST
body:
  type: formdata
  content:
    - type: file
      key: files[]
      src:
        - /E:/Projects/costume-rental/mock/images/1779014978097-tumblr_40657a0bc14cf72f554f6d0878d87f73_b95371a9_640.jpg
        - /E:/Projects/costume-rental/mock/images/1779014978100-tumblr_b70c65235e7d2c88d919eec5b788638f_79b8642f_640.jpg
      description: ""
      disabled: false
    - type: text
      key: data
      value: '{"category_id": 1}'
      description: ""
      disabled: false
order: 5000
