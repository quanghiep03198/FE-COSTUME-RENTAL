$kind: http-request
description: |-
  Lấy thông tin chi tiết của một người dùng theo ID, bao gồm thông tin liên kết nhân viên.

  **Path Variables:**

  | Tham số | Kiểu | Mô tả |
  |---------|------|-------|
  | id | integer | ID của người dùng cần lấy |

  **Response:**

  - 200 OK: Đối tượng User đầy đủ thông tin.
  - 404 Not Found: Không tìm thấy người dùng.
url: "{{baseUrl}}/users/:id"
method: GET
pathVariables:
  - key: id
    value: ""
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 3000
