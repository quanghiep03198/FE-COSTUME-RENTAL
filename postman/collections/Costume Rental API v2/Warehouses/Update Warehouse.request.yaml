$kind: http-request
description: |-
  Cập nhật thông tin của một kho hàng theo ID. Yêu cầu quyền ADMIN.

  **Path Variables:**

  | Tham số | Kiểu | Mô tả |
  |---------|------|-------|
  | id | integer | ID của kho cần cập nhật |

  **Body (JSON):**

  | Trường | Kiểu | Mô tả |
  |--------|------|-------|
  | name | string | Tên kho mới |
  | type | enum | Loại kho mới: COSTUME hoặc EQUIPMENT_PROPS |
  | managed_by | integer | ID nhân viên quản lý mới |

  **Response:**

  - 200 OK: Kho sau khi cập nhật.
  - 404 Not Found: Không tìm thấy kho.
url: "{{baseUrl}}/warehouses/:id"
method: PATCH
headers:
  Content-Type: application/json
pathVariables:
  - key: id
    value: ""
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "name": "",
      "type": "",
      "managed_by": null
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string"
        },
        "type": {
          "type": "string"
        },
        "managed_by": {
          "type": "null"
        }
      }
    }
order: 4000
