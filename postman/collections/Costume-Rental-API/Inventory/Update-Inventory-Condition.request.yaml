$kind: http-request
name: Update Inventory Condition
description: |-
  Cập nhật tình trạng chất lượng của một sản phẩm cụ thể trong kho theo SKU. Dùng để ghi nhận tình trạng sản phẩm sau khi kiểm tra hoặc bảo trì.

  **Path Variables:**

  | Tham số | Kiểu | Mô tả |
  |---------|------|-------|
  | sku | string | Mã SKU của bản ghi tồn kho cần cập nhật |

  **Body (JSON):**

  | Trường | Kiểu | Mô tả |
  |--------|------|-------|
  | inventory_condition_id | integer | ID tình trạng mới (InventoryCondition: A/B/C) |

  **Response:**

  - 200 OK: Bản ghi Inventory sau khi cập nhật tình trạng.
  - 404 Not Found: Không tìm thấy bản ghi với SKU đã cho.
method: PATCH
url: '{{baseUrl}}/inventory/condition/:sku'
pathVariables:
  sku: TP-ADLT-VOL200-0001
order: 4000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "inventory_condition_id": 1
    }
