$kind: http-request
name: List Costume Inventory
description: |-
  Lay danh sach ton kho trang phuc. Ho tro loc theo nhieu tieu chi va mo rong thong tin tinh trang san pham.

  **Query Params:**
  | Tham so | Kieu | Mo ta |
  |---------|------|-------|
  | _expand | string | Mo rong du lieu lien ket (vi du: inventory_condition) |
  | item_id | integer | Loc theo ID trang phuc |
  | inventory_condition_id | integer | Loc theo ID tinh trang san pham |
  | warehouse_id | integer | Loc theo ID kho |
  | status | enum | Loc theo trang thai: AVAILABLE, RENTED, MAINTENANCE, DISPOSED |
  | keyword | string | Tim kiem theo tu khoa (ten, SKU) |

  **Response:**
  - 200 OK: Mang cac ban ghi Inventory cua trang phuc.
method: GET
url: '{{baseUrl}}/inventory/costumes'
queryParams:
  - key: _expand
    value: inventory_condition
    disabled: true
order: 1000
params:
  - key: item_id
    value: ''
    disabled: true
  - key: inventory_condition_id
    value: ''
    disabled: true
  - key: warehouse_id
    value: ''
    disabled: true
  - key: status
    value: ''
    disabled: true
  - key: keyword
    value: ''
    disabled: true
