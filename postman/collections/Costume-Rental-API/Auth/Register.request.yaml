$kind: http-request
name: Register
method: POST
url: '{{baseUrl}}/api/register'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "",
      "email": "",
      "password": "",
      "display_name": "",
      "role": "USER"
    }
