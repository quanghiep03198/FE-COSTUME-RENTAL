$kind: http-request
name: Login
description: |-
  Dang nhap vao he thong bang ten dang nhap va mat khau. Khi thanh cong, server tra ve accessToken (JWT) va thong tin nguoi dung. Access token se duoc luu vao bien moi truong token tu dong qua script.

  **Body (JSON):**
  | Truong | Kieu | Mo ta |
  |--------|------|-------|
  | username | string | Ten dang nhap cua tai khoan |
  | password | string | Mat khau cua tai khoan |

  **Response:**
  - 200 OK: { accessToken, user } - dang nhap thanh cong, token duoc luu vao moi truong.
  - 401 Unauthorized: Sai ten dang nhap hoac mat khau.
method: POST
url: '{{baseUrl}}/auth/login'
scripts:
  - type: afterResponse
    code: "const jsonData = pm.response.json();\r

      \r

      pm.test('Login status is 200', function () {\r

      \    pm.response.to.have.status(200);\r

      \    pm.expect(jsonData).to.have.property('accessToken');\r

      \    pm.expect(jsonData).to.have.property('user');\r

      });\r

      \r

      if (pm.response.code === 200 && jsonData) {\r

      \    const token = jsonData.accessToken;\r

      \    const user = jsonData.user || {};\r

      \r

      \    if (token) pm.environment.set('token', token);\r

      }\r

      \r

      pm.test('Response time is less than 2000ms', function () {\r

      \    pm.expect(pm.response.responseTime).to.be.below(2000);\r

      });"
    language: text/javascript
order: 1000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "quanghiep031",
      "password": "123123"
    }
