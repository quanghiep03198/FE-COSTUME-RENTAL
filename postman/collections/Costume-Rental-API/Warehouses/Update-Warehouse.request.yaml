$kind: http-request
name: Update Warehouse
description: |-
  Cap nhat thong tin cua mot kho hang theo ID. Yeu cau quyen ADMIN.

  **Path Variables:**
  | Tham so | Kieu | Mo ta |
  |---------|------|-------|
  | id | integer | ID cua kho can cap nhat |

  **Body (JSON):**
  | Truong | Kieu | Mo ta |
  |--------|------|-------|
  | name | string | Ten kho moi |
  | type | enum | Loai kho moi: COSTUME hoac EQUIPMENT_PROPS |
  | managed_by | integer | ID nhan vien quan ly moi |

  **Response:**
  - 200 OK: Kho sau khi cap nhat.
  - 404 Not Found: Khong tim thay kho.
method: PATCH
url: '{{baseUrl}}/warehouses/:id'
order: 4000
pathVariables:
  - key: id
    value: ''
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "",
      "type": "",
      "managed_by": null
    }
