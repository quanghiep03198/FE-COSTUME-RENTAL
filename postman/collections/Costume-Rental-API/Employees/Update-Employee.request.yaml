$kind: http-request
name: Update Employee
description: |-
  Cập nhật thông tin của một nhân viên theo ID. Yêu cầu quyền ADMIN.

  **Path Variables:**

  | Tham số | Kiểu | Mô tả |
  |---------|------|-------|
  | id | integer | ID của nhân viên cần cập nhật |

  **Body (JSON):**

  | Trường | Kiểu | Mô tả |
  |--------|------|-------|
  | full_name | string | Họ và tên mới |
  | phone | string | Số điện thoại mới |
  | work_status | enum | Trạng thái làm việc mới: ACTIVE, SUSPENDED, EXITED |

  **Response:**

  - 200 OK: Hồ sơ nhân viên sau khi cập nhật.
  - 404 Not Found: Không tìm thấy nhân viên.
method: PATCH
url: "{{baseUrl}}/employees/update/:id"
order: 4000
pathVariables:
  id: "9"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "full_name": "Nguyễn Ngọc Đức Thành",
      "phone": "0942899559",
      "work_status": "ACTIVE"
    }
