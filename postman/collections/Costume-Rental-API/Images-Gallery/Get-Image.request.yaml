$kind: http-request
name: Get Image
description: |-
  Lay thong tin metadata cua mot hinh anh theo ID, bao gom ten file, kich thuoc, URL truy cap va danh muc lien ket.

  **Path Variables:**
  | Tham so | Kieu | Mo ta |
  |---------|------|-------|
  | id | integer | ID cua hinh anh can lay |

  **Response:**
  - 200 OK: Doi tuong ImageGallery voi day du metadata.
  - 404 Not Found: Khong tim thay hinh anh.
method: GET
url: '{{baseUrl}}/images-gallery/:id'
order: 2000
pathVariables:
  - key: id
    value: ''
