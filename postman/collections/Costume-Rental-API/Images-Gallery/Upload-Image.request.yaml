$kind: http-request
name: Upload Image
description: |-
  Upload mot hoac nhieu hinh anh len he thong su dung multipart/form-data. Ho tro cac dinh dang PNG, JPG, JPEG, WEBP. Tra ve thong tin metadata cua cac anh da upload.

  **Form Data:**
  | Truong | Kieu | Mo ta |
  |--------|------|-------|
  | data | text (JSON) | Metadata kem theo: { category_id } |
  | files | file | File anh can upload (PNG/JPG/JPEG/WEBP) |

  **Response:**
  - 201 Created: Danh sach doi tuong ImageGallery cua cac anh da upload.
  - 400 Bad Request: Dinh dang file khong hop le.
method: POST
url: '{{baseUrl}}/images-gallery/upload'
order: 3000
body:
  type: formdata
  content:
    - key: data
      type: text
      value: '{"category_id":""}'
    - key: files
      type: file
      src: ''
