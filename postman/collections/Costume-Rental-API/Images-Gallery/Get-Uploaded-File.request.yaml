$kind: http-request
name: Get Uploaded File
description: |-
  Truy xuat truc tiep file anh da upload tu server theo ten thu muc va ten file. Endpoint nay khong yeu cau xac thuc (noauth) va tra ve binary stream cua file anh.

  **Path Variables:**
  | Tham so | Kieu | Mo ta |
  |---------|------|-------|
  | folder | string | Ten thu muc chua file tren server |
  | fileName | string | Ten file anh can truy xuat |

  **Response:**
  - 200 OK: Binary stream cua file anh voi Content-Type tuong ung.
  - 404 Not Found: Khong tim thay file.
method: GET
url: '{{baseUrl}}/upload/:folder/:fileName'
order: 6000
auth:
  type: noauth
pathVariables:
  - key: folder
    value: ''
  - key: fileName
    value: ''
