name: Categories
description: |-
  ## Danh mục Sản phẩm

  Nhóm các API quản lý danh mục sản phẩm trong hệ thống cho thuê trang phục. Danh mục được dùng để phân loại cả trang phục lẫn đạo cụ/thiết bị, giúp tổ chức kho hàng và tìm kiếm sản phẩm hiệu quả hơn.

  ### Entity liên quan
  - **ItemCategory**: Danh mục sản phẩm với các trường `id`, `name`, `slug`, `type` (COSTUME/EQUIPMENT_PROPS). Mỗi danh mục thuộc một trong hai loại: trang phục hoặc đạo cụ/thiết bị.

  ### Endpoints
  - **GET /api/categories** – Lấy danh sách tất cả danh mục, hỗ trợ lọc theo `type` (COSTUME hoặc EQUIPMENT_PROPS).
  - **GET /api/categories/:id** – Lấy thông tin chi tiết của một danh mục theo `id`.
  - **POST /api/categories** – Tạo danh mục mới với `name`, `slug` và `type`.
  - **PUT /api/categories/:id** – Cập nhật thông tin danh mục theo `id`.
  - **DELETE /api/categories/:id** – Xóa danh mục theo `id` (yêu cầu quyền ADMIN).


  ## Schema: ItemCategory

  | Truong | Kieu | Mo ta |
  |--------|------|-------|
  | `id` | integer | Khoa chinh, dinh danh duy nhat |
  | `name` | string | Ten danh muc |
  | `slug` | string | Slug URL than thien, tu dong sinh tu `name` |
  | `type` | enum | Loai danh muc: `COSTUME` (trang phuc) hoac `EQUIPMENT_PROPS` (dao cu) |
  | `is_active` | boolean | Trang thai kich hoat (mac dinh: `true`) |
  | `created_at` | datetime | Thoi diem tao |
  | `updated_at` | datetime / null | Thoi diem cap nhat gan nhat |
  | `created_by` | integer | ID nguoi tao |
  | `updated_by` | integer | ID nguoi cap nhat gan nhat |
  | `remark` | string | Ghi chu them |
