$kind: http-request
name: List Categories
description: |-
  Lấy danh sách tất cả danh mục sản phẩm trong hệ thống. Hỗ trợ lọc theo loại danh mục và những sản phẩm liên kết.

  **Query Params:**

  | Tham số | Kiểu | Mô tả |
  | --- | --- | --- |
  | _embed | string | Những dữ liệu liên kết (ví dụ: costumes) |
  | type:eq | enum | Lọc theo loại: COSTUME hoặc EQUIPMENT_PROPS |

  **Response:**

  - 200 OK: Mảng các đối tượng ItemCategory.
method: GET
url: "{{baseUrl}}/categories?_embed=costumes&type:eq=COSTUME"
queryParams:
  - key: _embed
    value: equipment_props
    disabled: true
  - key: type:eq
    value: EQUIPMENT_PROPS
    disabled: true
  - key: _embed
    value: costumes
  - key: type:eq
    value: COSTUME
order: 1000
