$kind: http-request
name: Update Category
description: |-
  Cap nhat thong tin cua mot danh muc san pham theo ID. Yeu cau quyen ADMIN.

  **Path Variables:**
  | Tham so | Kieu | Mo ta |
  |---------|------|-------|
  | id | integer | ID cua danh muc can cap nhat |

  **Body (JSON):**
  | Truong | Kieu | Mo ta |
  |--------|------|-------|
  | name | string | Ten danh muc moi |
  | type | enum | Loai danh muc: COSTUME hoac EQUIPMENT_PROPS |

  **Response:**
  - 200 OK: Danh muc sau khi cap nhat.
  - 404 Not Found: Khong tim thay danh muc.
method: PATCH
url: '{{baseUrl}}/categories/:id'
order: 4000
pathVariables:
  - key: id
    value: ''
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "",
      "type": ""
    }
