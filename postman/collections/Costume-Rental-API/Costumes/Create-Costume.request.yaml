$kind: http-request
name: Create Costume
description: |-
  Tao moi mot trang phuc trong he thong. Yeu cau quyen ADMIN. SKU va slug se duoc tu dong sinh.

  **Body (JSON):**
  | Truong | Kieu | Mo ta |
  |--------|------|-------|
  | name | string | Ten trang phuc |
  | category_id | integer | ID danh muc (ItemCategory, type = COSTUME) |
  | sizes | array | Cac kich co: XS, S, M, L, XL, 2XL, 3XL |
  | gender | enum | Gioi tinh: MALE, FEMALE, UNISEX |
  | images | array | Danh sach ID anh (ImageGallery) |
  | rental_price_per_day | integer | Gia thue/ngay (toi thieu 50.000 VND) |
  | unit | enum | Don vi: SET hoac PIECE |
  | description | string | Mo ta chi tiet |
  | hashtags | array | Danh sach hashtag, khong trung lap |
  | color | object | Mau sac: { hex, code, intensity } |

  **Response:**
  - 201 Created: Trang phuc moi duoc tao thanh cong.
  - 400 Bad Request: Du lieu khong hop le.
method: POST
url: '{{baseUrl}}/costumes'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "",
      "category_id": null,
      "sizes": [],
      "gender": "",
      "images": [],
      "rental_price_per_day": 50000,
      "unit": "",
      "description": null,
      "hashtags": [],
      "color": null
    }
