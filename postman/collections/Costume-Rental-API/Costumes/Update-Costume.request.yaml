$kind: http-request
name: Update Costume
description: |-
  Cap nhat thong tin cua mot trang phuc theo ID. Yeu cau quyen ADMIN. Chi can gui cac truong can thay doi.

  **Path Variables:**
  | Tham so | Kieu | Mo ta |
  |---------|------|-------|
  | id | integer | ID cua trang phuc can cap nhat |

  **Body (JSON):**
  | Truong | Kieu | Mo ta |
  |--------|------|-------|
  | name | string | Ten trang phuc moi |
  | rental_price_per_day | integer | Gia thue moi (toi thieu 50.000 VND) |
  | is_active | boolean | Trang thai kich hoat |

  **Response:**
  - 200 OK: Trang phuc sau khi cap nhat.
  - 404 Not Found: Khong tim thay trang phuc.
method: PATCH
url: '{{baseUrl}}/costumes/:id'
order: 4000
pathVariables:
  - key: id
    value: ''
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "",
      "rental_price_per_day": 50000,
      "is_active": true
    }
