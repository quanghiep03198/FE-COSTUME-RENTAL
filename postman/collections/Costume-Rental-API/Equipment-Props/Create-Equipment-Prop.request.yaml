$kind: http-request
name: Create Equipment Prop
description: |-
  Tao moi mot dao cu/thiet bi trong he thong. Yeu cau quyen ADMIN. Slug se duoc tu dong sinh tu truong name.

  **Body (JSON):**
  | Truong | Kieu | Mo ta |
  |--------|------|-------|
  | name | string | Ten dao cu/thiet bi |
  | category_id | integer | ID danh muc (ItemCategory, type = EQUIPMENT_PROPS) |
  | rental_price_per_day | integer | Gia thue/ngay (toi thieu 50.000 VND) |
  | weight_kg | number | Trong luong tinh bang kg |
  | dimensions | object | Kich thuoc (dai x rong x cao) |
  | is_fragile | boolean | Co de vo/hu khong (mac dinh: false) |
  | description | string | Mo ta chi tiet |
  | images | array | Danh sach ID anh (ImageGallery) |
  | unit | string | Don vi tinh (vi du: cai, bo, chiec) |
  | hashtags | array | Danh sach hashtag, khong trung lap |

  **Response:**
  - 201 Created: Dao cu/thiet bi moi duoc tao thanh cong.
  - 400 Bad Request: Du lieu khong hop le.
method: POST
url: '{{baseUrl}}/equipment-props'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "",
      "category_id": null,
      "rental_price_per_day": 50000,
      "weight_kg": null,
      "dimensions": null,
      "is_fragile": false,
      "description": null,
      "images": [],
      "unit": "",
      "hashtags": []
    }
